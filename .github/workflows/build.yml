name: Build VelocityOptic
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Mod
        # We use 'build' but ensure the project is remapped for Minecraft
        run: gradle build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityOptic-Mod
          # This modified path helps GitHub find the jar even if the folder name varies
          path: "**/build/libs/*.jar"
          if-no-files-found: error
          
